<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IGA_STUD | Student</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100">
    <header>
        <header class="bg-blue-600 text-white p-4 shadow">

  <div class="flex justify-between items-center">

    <h1 class="text-2xl font-bold">
      IGA_STUD
    </h1>

    <nav class="space-x-4">

      <a href="index.html" class="hover:text-yellow-300">Home</a>

      <a href="admin.html" class="hover:text-yellow-300">Admin</a>

      <a href="student.html" class="hover:text-yellow-300">Student</a>

      <a href="announcements.html" class="hover:text-yellow-300">Announcements</a>

      <a href="notifications.html" class="hover:text-yellow-300">Notifications</a>

    </nav>

  </div>

</header>
    </header>


<!-- Student Login -->
<div id="loginSection" class="flex justify-center items-center h-screen">

  <div class="bg-white p-6 rounded shadow w-80">

    <h2 class="text-2xl font-bold mb-4 text-center">
      Student Login
    </h2>

    <input id="studentName"
      type="text"
      placeholder="Enter student name"
      class="w-full border p-2 mb-3">

    <input id="studentPass"
      type="password"
      placeholder="Enter password"
      class="w-full border p-2 mb-3">

    <button onclick="login()"
      class="bg-green-600 text-white w-full p-2 rounded hover:bg-green-700">
      Login
    </button>

    

  </div>
  

</div>

<!-- Student dashboard -->
<div id="dashboard" class="hidden p-6">

  <h1 class="text-3xl font-bold mb-4">
    Student Dashboard
  </h1>

  <button onclick="logout()"
    class="bg-red-500 text-white px-4 py-2 mb-4 rounded">
    Logout
  </button>


  <!-- TASK LIST -->
  <div id="taskList"></div>

</div>





<!-- INTERNAL JAVASCRIPT -->
<script>


// Example tasks (in real case from admin)
let tasks =
[
  { name: "Complete HTML Assignment", completed: false },
  { name: "Study Tailwind CSS", completed: false },
  { name: "Prepare JavaScript Project", completed: false }
];



function login()
{
  let name = document.getElementById("studentName").value;
  let pass = document.getElementById("studentPass").value;

  if(name !== "" && pass !== "")
  {
    document.getElementById("loginSection").classList.add("hidden");

    document.getElementById("dashboard").classList.remove("hidden");

    displayTasks();
  }
  else
  {
    alert("Enter student name and password");
  }
}



function logout()
{
  location.reload();
}



function displayTasks()
{
  let list = document.getElementById("taskList");

  list.innerHTML = "";

  tasks.forEach((task, index) =>
  {

    list.innerHTML += `
    
    <div class="bg-white p-4 shadow mb-2 flex justify-between items-center">
    
      <span class="${task.completed ? 'line-through text-gray-400' : ''}">
        ${task.name}
      </span>
      
      <button onclick="completeTask(${index})"
        class="bg-blue-600 text-white px-3 py-1 rounded">
        Complete
      </button>

    </div>

    `;

  });
}



function completeTask(index)
{
  tasks[index].completed = true;

  displayTasks();
}


</script>

</body>
</html>
