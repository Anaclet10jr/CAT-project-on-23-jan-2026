<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Student Task Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded shadow-md w-full max-w-sm">
  <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
  <form id="loginForm" class="flex flex-col gap-4">
    <input type="text" id="username" placeholder="Username" class="border p-2 rounded" required>
    <input type="password" id="password" placeholder="Password" class="border p-2 rounded" required>
    <button type="submit" class="bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Login</button>
  </form>
  <p class="mt-4 text-sm text-center">New user? <a href="#" class="text-blue-500">Register</a></p>
</div>

<script>
  const loginForm = document.getElementById('loginForm');
  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    // Simple LocalStorage check
    const user = JSON.parse(localStorage.getItem('user'));
    if(user && user.username === username && user.password === password){
      localStorage.setItem('loggedIn', 'true');
      window.location.href = 'dashboard.html';
    } else {
      alert('Invalid username or password!');
    }
  });

  // Optional: Create default user if not exist
  if(!localStorage.getItem('user')){
    localStorage.setItem('user', JSON.stringify({username: 'student', password: '1234'}));
  }
</script>

</body>
</html>
